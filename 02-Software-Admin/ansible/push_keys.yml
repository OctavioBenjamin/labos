---
- name: Distribuir llaves SSH a todos los laboratorios
  hosts: all
  gather_facts: no
  tasks:
    - name: Autorizar llave pública de informatica
      authorized_key:
        user: admin
        state: present
        key: "{{ lookup('file', '/home/informatica/.ssh/id_ed25519.pub') }}"

    - name: Autorizar llave pública de controlador
      authorized_key:
        user: admin
        state: present
        key: "{{ lookup('file', '/home/controlador/.ssh/id_ed25519.pub') }}"
