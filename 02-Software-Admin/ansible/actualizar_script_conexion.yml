---
- name: Instalar directorio /etc/psico y script fw_conexion.sh
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Crear carpeta /etc/psico con permisos y propietarios correctos
      ansible.builtin.file:
        path: /etc/psico
        state: directory
        owner: root
        group: root
        mode: '0770'

    - name: Copiar fw_conexion.sh a /etc/psico/
      ansible.builtin.copy:
        src: /srv/labos/02-Software-Admin/fw_conexion.sh
        dest: /etc/psico/fw_conexion.sh
        owner: root
        group: root
        mode: '0770'
