- name: energy_reboot
  hosts: all
  become: yes
  tasks:
    - name: Reiniciar y esperar a que responda
      ansible.builtin.reboot:
        msg: "Reinicio energy_reboot iniciado por Ansible. El sistema volverá en breve."
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami

    - name: Siguiente tarea tras el reinicio
      ansible.builtin.debug:
        msg: "El servidor se reinició con éxito y estamos de vuelta."
