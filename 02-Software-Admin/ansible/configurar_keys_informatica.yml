---
- name: Cargar llave SSH de informatica en hosts
  hosts: all
  gather_facts: no

  tasks:

    - name: Verificar conectividad
      ping:
      register: ping_resultado
      ignore_errors: yes

    - name: Asegurar que existe el directorio .ssh en admin
      file:
        path: /home/admin/.ssh
        state: directory
        mode: '0700'
        owner: admin
        group: admin
      when: ping_resultado is succeeded

    - name: Agregar llave pública de informatica a authorized_keys
      authorized_key:
        user: admin
        state: present
        key: "{{ lookup('file', '/home/informatica/.ssh/id_ed25519.pub') }}"
      when: ping_resultado is succeeded

    - name: Resultado
      debug:
        msg: "{{ inventory_hostname }}: {{ '✅ Llave de informatica cargada' if ping_resultado is succeeded else '❌ Host no disponible' }}"
