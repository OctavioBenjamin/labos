#cloud-config
# autoinstall.yaml - Proyecto Labos
# Ubuntu 24.04 LTS (Noble Numbat)
autoinstall:
  version: 1
  interactive-sections:
    - identity
  storage:
    layout:
      name: direct
  identity:
    hostname: laboratorio-mini-pc
    username: admin
    # Password: admin (Hashed)
    passwd: $6$wJfQbgjoPZwiFOc0$aWdF4ZKU1QhXbN2qXtQl3VlmcFQjOMuFPApMswo/VM4xnNsmF.4O5fYdSbFF/DOTu/EuAE160rGuVE/rU23lr/
    realname: Administrador
  ssh:
    install-server: true
    allow-pw: true
  packages:
    - curl
    - libreoffice
    - evince
    - p7zip-full
    - unzip
    - openssh-server
    - ethtool
    - iptables-persistent
    - dnsutils
    - x11-xserver-utils
    - wget
    - gnupg2
    - software-properties-common
    - git
  user-data:
    users:
      - name: laboratorio
      shell: /bin/bash
      lock_passwd: false
      # Password: admin (Hashed)
      passwd: $6$wJfQbgjoPZwiFOc0$aWdF4ZKU1QhXbN2qXtQl3VlmcFQjOMuFPApMswo/VM4xnNsmF.4O5fYdSbFF/DOTu/EuAE160rGuVE/rU23lr/
    runcmd:
      # 1. Clonar repositorio primero para tener los scripts disponibles
      - git clone https://github.com/OctavioBenjamin/labos.git /home/admin/labos
      - chown -R admin:admin /home/admin/labos

      # 2. Configuración de Repositorios para Wine (Noble)
      - dpkg --add-architecture i386
      - mkdir -pm755 /etc/apt/keyrings
      - wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
      - wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources
      - apt-get update
      - DEBIAN_FRONTEND=noninteractive apt-get install -y --install-recommends winehq-stable

      # 3. Desactivar suspensión de pantalla y energía (System-wide)
      - |
        cat <<EOF > /usr/share/glib-2.0/schemas/90_labos.gschema.override
        [org.gnome.desktop.session]
        idle-delay=uint32 0
        [org.gnome.settings-daemon.plugins.power]
        sleep-inactive-ac-type='nothing'
        sleep-inactive-battery-type='nothing'
        EOF
      - glib-compile-schemas /usr/share/glib-2.0/schemas/

      # 4. Configurar Wake-on-LAN
      - |
        INTERFACE=$(ip -o link show | awk -F': ' '{print $2}' | grep -v 'lo' | grep -v 'wlan' | head -n 1)
        ethtool -s $INTERFACE wol g
        cat <<EOF > /etc/systemd/system/wol.service
        [Unit]
        Description=Configure Wake-on-LAN
        After=network-online.target
        [Service]
        Type=oneshot
        ExecStart=/usr/sbin/ethtool -s $INTERFACE wol g
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable wol.service

      # 5. Configurar Autologin para 'laboratorio'
      - |
        sed -i 's/#  AutomaticLoginEnable = true/AutomaticLoginEnable = true/' /etc/gdm3/custom.conf
        sed -i 's/#  AutomaticLogin = user1/AutomaticLogin = laboratorio/' /etc/gdm3/custom.conf

      # 6. Restricción del usuario 'laboratorio' (Sin contraseña para alumnos)
      - passwd -d laboratorio

      # 7. Configuración de Sudoers para Admin (Sin password para scripts y poweroff)
      - |
        cat <<EOF > /etc/sudoers.d/90-admin-custom
        admin ALL=(ALL) NOPASSWD: /usr/bin/bash /home/admin/labos/firewalls/conexion.sh *, /usr/sbin/poweroff
        EOF
        chmod 0440 /etc/sudoers.d/90-admin-custom

      # 8. Preparar Escritorio de Laboratorio (Accesos directos y script InfoStat)
      - mkdir -p /home/laboratorio/Escritorio
      - |
        cat <<EOF > /home/laboratorio/Escritorio/LibreOffice.desktop
        [Desktop Entry]
        Name=LibreOffice
        Exec=libreoffice
        Icon=libreoffice-main
        Type=Application
        Terminal=false
        EOF
      - |
        cat <<EOF > /home/laboratorio/Escritorio/Calculadora.desktop
        [Desktop Entry]
        Name=Calculadora
        Exec=gnome-calculator
        Icon=org.gnome.Calculator
        Type=Application
        Terminal=false
        EOF
      - cp /home/admin/labos/config_inicial/install-infostat.sh /home/laboratorio/Escritorio/Instalar-InfoStat.sh
      - chmod +x /home/laboratorio/Escritorio/*.desktop
      - chmod +x /home/laboratorio/Escritorio/Instalar-InfoStat.sh

      # 9. Firefox Autostart
      - mkdir -p /home/laboratorio/.config/autostart
      - |
        cat <<EOF > /home/laboratorio/.config/autostart/firefox-aula-virtual.desktop
        [Desktop Entry]
        Type=Application
        Exec=firefox https://psicologia.aulavirtual.unc.edu.ar/
        Name=Firefox Aula Virtual
        EOF
      
      # 10. Ajustar permisos finales
      - chown -R laboratorio:laboratorio /home/laboratorio/
